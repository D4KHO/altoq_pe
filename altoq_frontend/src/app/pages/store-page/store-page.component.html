<div class="store-page-bg">

  <!-- Loading -->
  <div *ngIf="isLoading" class="flex flex-col items-center justify-center py-32">
    <div class="spinner"></div>
    <p class="mt-4 text-slate-500 text-sm">Cargando tienda...</p>
  </div>

  <!-- Error -->
  <div *ngIf="!isLoading && errorMessage" class="max-w-lg mx-auto mt-20 bg-red-50 border border-red-200 rounded-xl p-8 text-center">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-red-400 mx-auto mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
    </svg>
    <p class="text-red-600 font-semibold">{{ errorMessage }}</p>
    <a routerLink="/products" class="mt-4 inline-block text-blue-600 hover:underline text-sm">Ver todos los productos</a>
  </div>

  <!-- Store Content -->
  <div *ngIf="!isLoading && store">

    <!-- Banner -->
    <div class="store-banner" [style.background]="getThemeGradient()">
      <div class="store-banner-overlay">
        <div class="max-w-6xl mx-auto px-4 py-8 flex items-end gap-6">

          <!-- Logo -->
          <div class="store-logo-wrapper">
            <img *ngIf="store.logo" [src]="store.logo" [alt]="store.name" class="w-full h-full object-cover rounded-xl">
            <div *ngIf="!store.logo" class="w-full h-full flex items-center justify-center bg-white/20 rounded-xl">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white/80" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
              </svg>
            </div>
          </div>

          <!-- Info -->
          <div class="text-white pb-1">
            <h1 class="text-3xl font-bold drop-shadow">{{ store.name }}</h1>
            <p *ngIf="store.description" class="text-white/80 text-sm mt-1 max-w-lg">{{ store.description }}</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Store Meta Bar -->
    <div class="bg-white border-b border-slate-200 shadow-sm">
      <div class="max-w-6xl mx-auto px-4 py-3 flex flex-wrap items-center gap-5 text-sm text-slate-600">

        <!-- Phone -->
        <span *ngIf="store.phone" class="flex items-center gap-1.5">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
          </svg>
          {{ store.phone }}
        </span>

        <!-- RUC -->
        <span *ngIf="store.ruc" class="flex items-center gap-1.5">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
          </svg>
          RUC: {{ store.ruc }}
        </span>

        <!-- Status badge -->
        <span class="ml-auto flex items-center gap-1.5 bg-green-50 text-green-700 border border-green-200 rounded-full px-3 py-0.5 text-xs font-semibold">
          <span class="w-1.5 h-1.5 rounded-full bg-green-500"></span>
          Tienda activa
        </span>
      </div>
    </div>

    <!-- Products Section -->
    <div class="max-w-6xl mx-auto px-4 py-8">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-xl font-bold text-slate-800">
          Productos de {{ store.name }}
          <span class="ml-2 text-sm font-normal text-slate-500">({{ storeProducts.length }} artículos)</span>
        </h2>
      </div>

      <!-- Empty state -->
      <div *ngIf="storeProducts.length === 0" class="flex flex-col items-center justify-center py-20 text-center bg-white rounded-xl border border-slate-200">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-slate-300 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" />
        </svg>
        <p class="text-slate-500 font-medium">Esta tienda aún no tiene productos disponibles.</p>
      </div>

      <!-- Products grid using the standard product-card component -->
      <div *ngIf="storeProducts.length > 0" class="products-grid">
        <app-product-card
          *ngFor="let product of storeProducts"
          [product]="product"
          (addToCart)="onAddToCart($event)">
        </app-product-card>
      </div>
    </div>

  </div>
</div>
