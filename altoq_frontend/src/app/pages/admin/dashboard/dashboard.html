<div class="min-h-screen bg-slate-50/50 flex flex-col font-outfit">
  <!-- Top Navigation Bar (Obsidian Glassmorphism) -->
  <nav class="bg-slate-950 text-white border-b border-slate-900 sticky top-0 z-50 shadow-sm">
    <div class="px-6 py-3.5 flex items-center justify-between">
      
      <!-- Brand Logo -->
      <div class="flex items-center gap-3">
        <div class="flex items-center gap-1.5">
          <span class="text-xl font-black tracking-wider bg-clip-text text-transparent bg-gradient-to-r from-white to-slate-200">ALTOQ</span>
          <span class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-pulse shadow-md shadow-blue-500/50"></span>
        </div>
        <span class="text-[9px] font-bold text-slate-400 tracking-widest uppercase bg-slate-900 border border-slate-800 px-2 py-0.5 rounded-md">ADMIN</span>
      </div>

      <!-- User Actions & Info -->
      <div class="flex items-center gap-6">
        <div class="flex items-center gap-2.5 border-r border-slate-800 pr-5">
          <div class="w-8 h-8 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center text-sm font-bold text-blue-400">
            {{ ((admin$ | async)?.username || 'A')[0] | uppercase }}
          </div>
          <div class="flex flex-col text-left">
            <span class="text-xs font-semibold text-slate-200 leading-none">{{ (admin$ | async)?.full_name || (admin$ | async)?.username || 'Administrador' }}</span>
            <span class="text-[9px] text-slate-500 font-medium mt-0.5">Super Admin</span>
          </div>
        </div>

        <!-- Logout Button (Premium translucent look) -->
        <button (click)="logout()" 
                class="flex items-center gap-2 px-3 py-1.5 border border-slate-800 hover:border-red-500/30 bg-slate-950 hover:bg-red-500/10 text-slate-400 hover:text-red-400 text-xs font-bold uppercase tracking-wider rounded-xl transition-all duration-300 cursor-pointer active:scale-95">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 01-3-3h4a3 3 0 013 3v1" />
          </svg>
          <span>Cerrar Sesión</span>
        </button>
      </div>

    </div>
  </nav>

  <div class="flex flex-1">
    <!-- Sidebar (Refined light graphite theme) -->
    <aside class="w-64 bg-white border-r border-slate-100 min-h-[calc(100vh-65px)] flex flex-col justify-between shrink-0 shadow-[1px_0_10px_rgba(15,23,42,0.01)]">
      <nav class="p-4 space-y-1">
        <div class="px-4 py-2 text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Navegación</div>
        
        <a routerLink="/admin/dashboard" 
           routerLinkActive="bg-blue-600 text-white shadow-md shadow-blue-500/15" 
           [routerLinkActiveOptions]="{exact: true}" 
           class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-slate-500 hover:bg-slate-50 hover:text-slate-800 transition-all duration-200">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2v-4zM14 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2v-4z" />
          </svg>
          <span>Dashboard</span>
        </a>
        
        <a routerLink="/admin/users" 
           routerLinkActive="bg-blue-600 text-white shadow-md shadow-blue-500/15" 
           class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-slate-500 hover:bg-slate-50 hover:text-slate-800 transition-all duration-200">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
          </svg>
          <span>Usuarios</span>
        </a>
        
        <a routerLink="/admin/stores" 
           routerLinkActive="bg-blue-600 text-white shadow-md shadow-blue-500/15" 
           class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-slate-500 hover:bg-slate-50 hover:text-slate-800 transition-all duration-200">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
          </svg>
          <span>Tiendas</span>
        </a>
      </nav>

      <!-- Footer en sidebar -->
      <div class="p-4 border-t border-slate-50 text-[10px] text-slate-400 font-medium text-center">
        AltoQ Admin Console v1.0.0
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 overflow-x-hidden">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
